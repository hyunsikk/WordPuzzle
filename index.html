<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodWords - Word Search Puzzle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-500 via-pink-500 to-orange-400">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-5xl font-bold text-white drop-shadow-lg mb-2">MoodWords</h1>
            <p class="text-white/80 text-lg">Find words that match your mood!</p>
        </header>

        <!-- API Key Setup (shown first time) -->
        <div id="api-setup" class="bg-white/90 backdrop-blur rounded-3xl shadow-2xl p-8 mb-8 hidden">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">Setup Required</h2>
            <p class="text-gray-600 mb-4">Enter your Claude API key to generate mood-based puzzles:</p>
            <div class="flex gap-4">
                <input type="password" id="api-key-input" placeholder="sk-ant-..."
                    class="flex-1 px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-purple-500 focus:outline-none text-lg">
                <button id="save-api-key"
                    class="px-6 py-3 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold rounded-xl hover:opacity-90 transition-opacity">
                    Save
                </button>
            </div>
        </div>

        <!-- Mood Input Section -->
        <div id="mood-section" class="bg-white/90 backdrop-blur rounded-3xl shadow-2xl p-8 mb-8">
            <label class="block text-2xl font-bold text-gray-800 mb-4">How are you feeling today?</label>
            <div class="flex gap-4">
                <input type="text" id="mood-input" placeholder="I'm feeling adventurous and excited..."
                    class="flex-1 px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-purple-500 focus:outline-none text-lg">
                <button id="generate-btn"
                    class="px-8 py-3 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold rounded-xl hover:opacity-90 transition-opacity disabled:opacity-50">
                    Go!
                </button>
            </div>
            <p id="error-message" class="text-red-500 mt-2 hidden"></p>
        </div>

        <!-- Game Section (hidden until puzzle generated) -->
        <div id="game-section" class="hidden">
            <div class="flex flex-col lg:flex-row gap-8">
                <!-- Puzzle Grid -->
                <div class="flex-1">
                    <div id="puzzle-container" class="bg-white/90 backdrop-blur rounded-3xl shadow-2xl p-6">
                        <div id="puzzle-grid" class="grid grid-cols-10 gap-1 aspect-square">
                            <!-- Grid cells will be generated by JS -->
                        </div>
                    </div>
                    <div class="flex gap-4 mt-4">
                        <button id="save-image-btn"
                            class="flex-1 px-6 py-3 bg-gradient-to-r from-blue-500 to-cyan-500 text-white font-bold rounded-xl hover:opacity-90 transition-opacity flex items-center justify-center gap-2">
                            <span>📷</span> Save as Image
                        </button>
                        <button id="new-puzzle-btn"
                            class="flex-1 px-6 py-3 bg-gradient-to-r from-green-500 to-emerald-500 text-white font-bold rounded-xl hover:opacity-90 transition-opacity">
                            New Puzzle
                        </button>
                    </div>
                </div>

                <!-- Word List Sidebar -->
                <div class="lg:w-64">
                    <div class="bg-white/90 backdrop-blur rounded-3xl shadow-2xl p-6">
                        <h2 class="text-xl font-bold text-gray-800 mb-4">Words to Find</h2>
                        <ul id="word-list" class="space-y-2">
                            <!-- Word items will be generated by JS -->
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <!-- Celebration Modal -->
        <div id="celebration-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50">
            <div class="bg-white rounded-3xl shadow-2xl p-8 text-center max-w-md mx-4 transform scale-100">
                <div class="text-6xl mb-4">🎉</div>
                <h2 class="text-3xl font-bold text-gray-800 mb-2">Congratulations!</h2>
                <p class="text-gray-600 mb-6">You found all the words!</p>
                <button id="play-again-btn"
                    class="px-8 py-3 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold rounded-xl hover:opacity-90 transition-opacity">
                    Play Again
                </button>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="puzzle.js"></script>
    <script src="app.js"></script>
</body>
</html>
